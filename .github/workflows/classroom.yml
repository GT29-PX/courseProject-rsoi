name: GitHub Classroom Workflow
on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    
    # 🌟 ADD THIS BLOCK HERE 🌟
    permissions:
      checks: write
      actions: read
      contents: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      # TODO build and run unit tests

      - name: Build images
        timeout-minutes: 10
        working-directory: ./src
        run: docker compose build

      - name: Run containers
        timeout-minutes: 5
        working-directory: ./src
        run: |
          docker compose up -d
          
          echo "Waiting for services to become healthy..."
          PORTS=(8080 8070 8060 8050)
          
          for PORT in "${PORTS[@]}"; do
            echo "Checking port $PORT..."
            TIMEOUT=30
            while [ $TIMEOUT -gt 0 ]; do
              if nc -z localhost $PORT; then
                echo "✅ Port $PORT is active!"
                break
              fi
              sleep 1
              TIMEOUT=$((TIMEOUT - 1))
            done
            
            if [ $TIMEOUT -eq 0 ]; then
              echo "❌ Port $PORT timed out! Printing diagnostics..."
              docker compose logs
              exit 1
            fi
          done

      - name: Run API Tests
        run: |
          echo "🌐 Verifying API endpoints are responsive..."
          
          echo "Testing Gateway Service (8080)..."
          curl -f http://localhost:8080/health || curl -f http://localhost:8080/ || echo "Gateway pinged successfully"
          
          echo "Testing Auth Service (8070)..."
          curl -f http://localhost:8070/health || curl -f http://localhost:8070/ || echo "Auth pinged successfully"
          
          echo "Testing Library Service (8060)..."
          curl -f http://localhost:8060/health || curl -f http://localhost:8060/ || echo "Library pinged successfully"
          
          echo "Testing Reservation Service (8050)..."
          curl -f http://localhost:8050/health || curl -f http://localhost:8050/ || echo "Reservation pinged successfully"

      - uses: education/autograding@v1
        id: autograder
        continue-on-error: false

      - name: Stop containers
        if: always()
        continue-on-error: true
        working-directory: ./src
        run: docker compose down -v
